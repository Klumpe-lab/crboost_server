# CryoBoost Server Configuration
# Copy this file to conf.yaml and fill in your values

# Root directory of the crboost_server installation
# Used by various services to locate resources
crboost_root: "/path/to/crboost_server"

# Path to Python virtual environment/conda executable
crboost_python: "/path/to/crboost_server/venv"

local:
  # Default directory where new projects will be created
  DefaultProjectBase: "/path/to/your/projects"
  
  # Default glob patterns for data import (optional, can be left empty)
  DefaultMoviesGlob: ""
  DefaultMdocsGlob: ""

slurm_defaults:
  # These are starting defaults - users can override per-job in the UI
  partition: "gpu"
  constraint: ""
  nodes: 1
  ntasks_per_node: 1
  cpus_per_task: 4
  gres: "gpu:1"
  mem: "32G"
  time: "2:00:00"


# Resources for the lightweight supervisor sbatch used by array-dispatching jobs
# (ts_reconstruct, ts_alignment, ts_ctf, fs_motion_and_ctf).
# The supervisor submits a child SLURM array, polls until done, and runs
# pure-Python metadata aggregation — no GPU work. The user-facing slurm_defaults
# above describe PER-TASK resources for the array's child sbatch.
supervisor_slurm:
  partition: "gpu"
  constraint: ""
  nodes: 1
  ntasks_per_node: 1
  cpus_per_task: 1
  gres: ""
  mem: "4G"
  time: "4:00:00"

# Per-job-type resource defaults for SLURM submissions.
# Keys must match JobType enum values (e.g. fsMotionAndCtf, tsReconstruct).
# Only fields present here override slurm_defaults; omitted fields inherit.
# Users can still override per-job in the UI (slurm_overrides).
# Merge order: slurm_defaults <- job_resource_profiles[jobtype] <- slurm_overrides
job_resource_profiles:
  fsMotionAndCtf:
    # mem=24G pairs with perdevice=2 (default in FsMotionCtfParams): two
    # concurrent EER movies per GPU need ~12-18GB GPU RAM plus host-side
    # frame-staging buffers. Drop to 16G if you set perdevice=1, or push to
    # 32G if you set perdevice=4 on an A100.
    gres: "gpu:1"
    mem: "24G"
    cpus_per_task: 2
    time: "0:30:00"

  aligntiltsWarp:
    gres: "gpu:1"
    mem: "16G"
    cpus_per_task: 2
    time: "0:15:00"

  tsCtf:
    gres: "gpu:1"
    mem: "8G"
    cpus_per_task: 2
    time: "0:10:00"

  tsReconstruct:
    gres: "gpu:1"
    mem: "64G"
    cpus_per_task: 4
    time: "1:00:00"

  tsImport:
    gres: ""
    mem: "4G"
    cpus_per_task: 1
    time: "0:30:00"

  denoisetrain:
    gres: "gpu:1"
    mem: "32G"
    cpus_per_task: 4
    time: "2:00:00"

  denoisepredict:
    gres: "gpu:1"
    mem: "16G"
    cpus_per_task: 2
    time: "0:20:00"

  templatematching:
    gres: "gpu:1"
    mem: "32G"
    cpus_per_task: 4
    time: "1:30:00"

  tmextractcand:
    gres: "gpu:1"
    mem: "8G"
    cpus_per_task: 2
    time: "0:15:00"

  subtomoExtraction:
    gres: "gpu:1"
    mem: "16G"
    cpus_per_task: 4
    time: "0:30:00"

  reconstructParticle:
    gres: "gpu:1"
    mem: "32G"
    cpus_per_task: 4
    time: "2:00:00"

  class3d:
    gres: "gpu:4"
    mem: "64G"
    cpus_per_task: 8
    time: "8:00:00"

processing_defaults:
  reconstruction_binning: 4

# Tool execution configuration
# exec_mode: 'container' or 'binary'
# container_path: path to .sif file (required if exec_mode is container)
# bin_path: path to executable or wrapper (required if exec_mode is binary)
tools:
  warp_aretomo:
    exec_mode: "container"
    container_path: "/path/to/warp_aretomo.sif"
    bin_path: ""
  cryocare:
    exec_mode: "container"
    container_path: "/path/to/cryocare.sif"
    bin_path: ""
  pytom:
    exec_mode: "container"
    container_path: "/path/to/pytom_match_pick.sif"
    bin_path: ""
  relion:
    exec_mode: "container"
    container_path: "/path/to/relion5.sif"
    bin_path: ""
  imod:
    exec_mode: "container"
    container_path: "/path/to/imod.sif"
    bin_path: ""
  cistem:
    exec_mode: "binary"
    container_path: ""
    bin_path: "/groups/klumpe/software/cisTEM/bin/simulate"
  pymol:
    exec_mode: "container"
    container_path: "/path/to/pymol.sif"
    bin_path: "pymol"